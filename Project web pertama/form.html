<!DOCTYPE html>
<html>
<head>
    <title>Html Form</title>
</head>
<body>
<!--Contoh form username dan password fungsi nya untuk pengisian data pada web-->
<form>
    <td><label for="Username">Username :</label></td>
    <input type="text" id="Username">
    <br>
    <label for="password">password :</label>
    <input type="password" id="password">
       <br>
<!--Contoh button, Radio button and checbox fungsi nya di gunakan untuk menambah kan tombol pada web-->
    <input type="radio" id="Pria" name="Gender"><label for="pria">pria</label>
    <input type="radio" id="wanita" name="Gender"><label for="wanita">wanita</label>
    <br>
    <input type="checkbox" id="Bermain sepak bola"><label for="Bermain sepak bola">Bermain sepak bola</label>
    <input type="checkbox" id="Memasak"><label for="Memasak">Memasak</label>
    <input type="checkbox" id="Menulis"><label for="Menulis">Menulis</label>
        <br>
<!--Textarea di fungsikan untuk membuat text area-->
    <textarea></textarea>
        <br>
<!--Select di gunakan untuk membuat combo box -->
    <select>
        <option>France</option>
        <option>German</option>
        <option>Portugal</option>
    </select>
        <br>

    <button type="submit">Gasss</button>
</form>    

</body>    
</html>
