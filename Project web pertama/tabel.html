<!DOCTYPE html>
<html>
<head>
    <title>Tabel</title>
</head>
<body>
<!--Contoh table simple tiga tag tersebut lebi baik dii gunakan di CSS-->
<table border="1" cellspacing="0" cellpadding="5">
        <tr>
            <td>baris 1, kolom1</td>
            <td>baris 1, kolom2</td>
        </tr>
        <tr>
            <td>baris 2, kolom1</td>
            <td>baris 2, colom2</td>
        </tr>
    </table> 
    <br>
<!--Contoh table colspan dan rowspan-->  
<table border="1" cellspacing="0" ceellpadding="5">
    <tr>
        <td>1,1</td>
        <td>1,2</td>
        <td>1,3</td>
        <td>1,4</td>
    </tr>
    <tr>
        <td>2,1</td>
        <td colspan="2" rowspan="2"></td>
        <td>2,3</td>
    </tr>
    <tr>
        <td>3,1</td>
        <td>3,4</td>
    </tr>
    <tr>
        <td>4,1</td>
        <td>4,2</td>
        <td>4,3</td>
        <td>4,4</td>
    </tr>
</table>
</body>
</html>
